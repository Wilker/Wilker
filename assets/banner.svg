<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Wilker">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0b0d"/>
      <stop offset="50%" stop-color="#220f12"/>
      <stop offset="100%" stop-color="#1c1014"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#7f1d1d" stop-opacity="0.25"/>
      <stop offset="50%" stop-color="#CC342D" stop-opacity="0.9"/>
      <stop offset="100%" stop-color="#D30001" stop-opacity="0.35"/>
