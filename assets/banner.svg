<svg xmlns="http://www.w3.org/2000/svg" width="1200" height="320" viewBox="0 0 1200 320" role="img" aria-label="Wilker">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#0b1220"/>
      <stop offset="55%" stop-color="#111827"/>
      <stop offset="100%" stop-color="#0f172a"/>
    </linearGradient>
    <linearGradient id="line" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.15"/>
      <stop offset="50%" stop-color="#2dd4bf" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#f59e0b" stop-opacity="0.35"/>
    </linearGradient>
    <radialGradient id="glow" cx="78%" cy="35%" r="40%">
      <stop offset="0%" stop-color="#14b8a6" stop-opacity="0.28"/>
      <stop offset="100%" stop-color="#14b8a6" stop-opacity="0"/>
    </radialGradient>
    <pattern id="grid" width="40" height="40" patternUnits="userSpaceOnUse">
      <path d="M 40 0 L 0 0 0 40" fill="none" stroke="#94a3b8" stroke-opacity="0.08" stroke-width="1"/>
    </pattern>
  </defs>

  <rect width="1200" height="320" fill="url(#bg)"/>
  <rect width="1200" height="320" fill="url(#grid)"/>
  <rect width="1200" height="320" fill="url(#glow)"/>

  <!-- SDN-ish topology -->
  <g stroke="url(#line)" stroke-width="1.6" fill="none">
    <path d="M180 220 C260 120, 340 120, 420 180 S580 260, 680 170 S860 80, 980 140"/>
    <path d="M220 250 C320 210, 390 90, 510 130 S700 250, 820 190 S940 110, 1040 160" opacity="0.55"/>
  </g>

  <g fill="#2dd4bf">
    <circle cx="220" cy="236" r="5"/>
    <circle cx="420" cy="180" r="5"/>
    <circle cx="560" cy="210" r="5"/>
    <circle cx="680" cy="170" r="6"/>
    <circle cx="820" cy="190" r="5"/>
    <circle cx="980" cy="140" r="5"/>
  </g>
  <g fill="#f59e0b">
    <circle cx="510" cy="130" r="4"/>
    <circle cx="940" cy="155" r="4"/>
  </g>

  <text x="72" y="128" font-family="ui-sans-serif, system-ui, -apple-system, Segoe UI, sans-serif" font-size="42" font-weight="700" fill="#f8fafc">
    Wilker de Oliveira Delfino
  </text>
  <text x="72" y="172" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="18" fill="#94a3b8">
    backend @ scale · SDN research · AI with feet on the ground
  </text>

  <rect x="72" y="208" width="220" height="34" rx="8" fill="#0f766e" fill-opacity="0.25" stroke="#2dd4bf" stroke-opacity="0.45"/>
  <text x="182" y="230" text-anchor="middle" font-family="ui-monospace, SFMono-Regular, Menlo, monospace" font-size="13" fill="#99f6e4">
    QConcursos · MídiaCom/UFF
  </text>
</svg>
